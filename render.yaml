services:
  - type: web
    name: falak-platform
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: |
      cd frontend && npm ci --include=dev && npm run build
      cd ../backend && npm ci --include=dev && npm run build || true
      cp -r ../frontend/dist ./dist/public
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: BACKEND_URL
        value: https://falak-platform.onrender.com
      - key: FRONTEND_URL
        value: https://falak-platform.onrender.com
      - key: SEED_DEMO
        value: "true"
      - key: LIVE_VIEW_MODE
        value: "false"   # Set to "true" to hide demo data platform-wide
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard — paste Neon connection string
